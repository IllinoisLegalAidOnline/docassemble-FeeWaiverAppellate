code: |
  def get_annual_total():
    annual_sum = 0
  
    if not user_is_incarcerated:
      if user_receives_benefits:
        return annual_sum
  
    if not user_annual_none:
      if user_annual_pension:
        annual_sum += user_annual_pension_amount
      if user_annual_unemployment:
        annual_sum += user_annual_unemployment_amount
      if user_annual_child_support:
        annual_sum += user_annual_child_support_amount
      if user_annual_employment:
        annual_sum += user_annual_employment_amount
      if user_annual_ss:
        annual_sum += user_annual_ss_amount
      if user_annual_household:
        annual_sum += user_annual_household_amount
      if user_annual_other:
        annual_sum += user_annual_other_list[0].amount
        if user_annual_other_list.number() > 1:
          annual_sum += user_annual_other_list[1].amount

    return annual_sum

