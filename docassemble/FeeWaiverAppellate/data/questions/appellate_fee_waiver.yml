  - user_asset_vehicle1_amount
  - user_asset_vehicle2_amount
  - user_asset_other_list[0].amount
  - user_asset_other_list[1].amount

code: |
  user_asset_total = get_asset_total()
---
code: |
  def get_asset_total():
    asset_sum = 0

    if user_receives_benefits:
      return asset_sum

    if not user_asset_none:
      if user_asset_bank_account:
        asset_sum += user_asset_bank_account_amount
      if user_asset_home:
        asset_sum += user_asset_home_amount
      if user_asset_other_real_estate:
        asset_sum += user_asset_other_real_estate_amount
      if user_asset_vehicle1:
        asset_sum += user_asset_vehicle1_amount
        if user_asset_vehicle2:
          asset_sum += user_asset_vehicle2_amount
      if user_asset_other:
        asset_sum += user_asset_other_list[0].amount
        if user_asset_other_list.number() > 1:
          asset_sum += user_asset_other_list[1].amount

    return asset_sum
---
depends on:
  - user_income_total
  - user_annual_total
code: |
  if not user_is_incarcerated and user_has_dependents:
    household_size = 1 + user_dependents_adults + user_dependents_children
    last_month_income_qualifies = poverty_scale_income_qualifies(user_income_total, household_size=household_size, multiplier=1.25)
    last_year_income_qualifies = poverty_scale_income_qualifies(user_annual_total/12, household_size=household_size, multiplier=1.25)
    last_month_income_qualifies_partial = poverty_scale_income_qualifies(user_income_total, household_size=household_size, multiplier=2.0)
    last_year_income_qualifies_partial = poverty_scale_income_qualifies(user_annual_total/12, household_size=household_size, multiplier=2.0)
  
  else:
    household_size = 1
    last_month_income_qualifies = poverty_scale_income_qualifies(user_income_total, multiplier=1.25)
    last_year_income_qualifies = poverty_scale_income_qualifies(user_annual_total/12, multiplier=1.25)
    last_month_income_qualifies_partial = poverty_scale_income_qualifies(user_income_total, multiplier=2.0)
    last_year_income_qualifies_partial = poverty_scale_income_qualifies(user_annual_total/12, multiplier=2.0)

