---
code: |
  def get_income_total():
    income_sum = 0

    if not user_is_incarcerated:
      if user_receives_benefits:
        return income_sum
  
    if not user_income_none:
      if user_income_pension:
        income_sum += user_income_pension_amount
      if user_income_unemployment:
        income_sum += user_income_unemployment_amount
      if user_income_child_support:
        income_sum += user_income_child_support_amount
      if user_income_employment:
        income_sum += user_income_employment_amount
      if user_income_ss:
        income_sum += user_income_ss_amount
      if user_income_household:
        income_sum += user_income_household_amount
      if user_income_other:
        income_sum += user_income_other_list[0].amount
        if user_income_other_list.number() > 1:
          income_sum += user_income_other_list[1].amount

    return income_sum
