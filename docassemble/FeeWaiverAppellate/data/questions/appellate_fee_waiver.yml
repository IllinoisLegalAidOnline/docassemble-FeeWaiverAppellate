  After you file your ${ form_name } application, a judge will review it. If they have questions, you may need to give more information or documentation. For example, you may be asked to show:
  
  * Proof of public benefits received,
  * Proof of income, and
  * The value of any belongings.
  
  **Note:** Some courts require that you submit proof of benefits or income when you file your ${ form_name } application. If you are e-filing, you may need to upload proof of benefits or income. The appellate clerk will let you know how to provide more information for your application.

  Once the court decides, they will send you an order. This order will say if you must pay none of the court fees, some of the court fees, or all of the court fees.
  
  Finally, the appellate clerk will mail or email you a copy of the order.  
