  % if filing_basis == "filing_self":
  Did you start the circuit court case, or did you respond to a case that someone else filed against you?
  % else:
  Did ${ users[0].familiar() } start the circuit court case, or did they respond to a case
  that someone else filed?
  % endif
subquestion: |
  ${ collapse_template(user_role_help) }
fields: 
  - no label: user_ask_role
    datatype: radio
    choices:
      - "I started the circuit court case.": plaintiff
      - "I am responding to a circuit court case filed against me.": defendant
    show if:
      code: |
        filing_basis == "filing_self"
  - no label: user_ask_role
    datatype: radio
    choices:
      - ${ users[0].familiar() } started the case: plaintiff
      - ${ users[0].familiar() } responded to a case filed against them: defendant
    show if:
      code: |
        filing_basis != "filing_self"
  - note: |
      % if filing_basis == "filing_self":
      Okay, you are the **Plaintiff** or **Petitioner** in the circuit court case. The other 
      side is the Defendant or Respondent.
      % else:
      Okay, ${ users[0].familiar() } is the **Plaintiff** or **Petitioner** in
      the circuit court case. The other side is the Defendant or Respondent. 
      % endif
    show if:
      variable: user_ask_role
      is: "plaintiff"
  - note: |
      % if filing_basis == "filing_self":
      Okay, you are the **Defendant** or **Respondent** in the circuit court case. The other 
      side is the Plaintiff or Petitioner.
      % else:
      Okay, ${ users[0].familiar() } is the **Defendant** or **Respondent** in
      the circuit court case. The other side is the Plaintiff or Petitioner.
      % endif
    show if:
      variable: user_ask_role
      is: "defendant"
