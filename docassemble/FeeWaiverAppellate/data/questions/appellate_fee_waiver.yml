id: welcome
question: |
  Fee waiver - Appellate Court
subquestion: |
  Welcome to Illinois Legal Aid Online's **Fee waiver - Appellate Court** Easy Form.
  
  This program makes a *Application for Waiver of Appellate Court Fees*, which asks the court to let you participate in an appeal for free or at a reduced cost.
  
  To learn more, read ILAO's article about [**court fees and fee waivers**](https://www.illinoislegalaid.org/node/189246).
field: sees_nav_bar
---
id: your name
sets:
    - users[0].name.first
    - users[0].name.last
question:  |
  What is your name?
fields:
  - code: |
      users[0].name_fields()
---
id: instructions
continue button field: how_to_use
question: |
  Instructions
subquestion: |
  To use this program you will need to know: 

  * The public benefits that you get,
  * Your income in the past month,
  * Your income over the past 12 months,
  * Your monthly expenses, and
  * The value of your belongings.

  You will also need to know information about the:
  
  * Circuit court case, including case number, county, and judge, and
  * Appellate court case for which you are requesting a fee waiver, including appellate district and who filed the appeal.

  You can find information about court cases on your court papers or documents you received from the court clerks.
  
  Set aside 10 to 15 minutes to finish this program. You can log in and save your work to continue later. 
 
  ${ collapse_template(help_example) }  

  Click on **{green words}** to learn what they mean. Some pages have a question mark in a circle ${ fa_icon("question-circle", color_css="#0dcaf0" ) } that helps explain things.
---
template: help_example
subject: |
  **You can click sections like this to show more information.**
content: |  
  This is an example of help. Click again to hide.
---
id: whats next
continue button field: whats_next
question: |
  After you finish this program
subquestion: |
  After you download your *Application for Waiver of Appellate Court Fees* (${ form_name }), you must file it with the court. This program **does not file** your ${ form_name } for you.
  
  **Note:** You can file your ${ form_name } at any time during your appellate court case. It is usually done when a person files their first forms in appellate court. That way they might have all of the court fees in a case waived.
  
  To learn more, read the "How to Request an Appellate Court Fee Waiver" instructions you can download at the end of this program. 
---
template: get_legal_help
subject: |
  **What if I need legal advice?**
content: |  
  If you have questions or concerns about your legal problem and want legal advice you should talk to a lawyer.
  
  Use [**Get Legal Help**](https://www.illinoislegalaid.org/get-legal-help) to find free or low-cost legal services in your area.
