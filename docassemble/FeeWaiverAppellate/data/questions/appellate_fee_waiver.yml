id: show_qualification_guess
continue button field: show_qualification_guess
question: |
  How to qualify for a waiver
subquestion: |  
  The judge will consider ${ your_or_their } income, assets, and expenses.
  
  You said ${ your_or_their } income in the past month was 
  ${ currency(get_income_total()) }, and ${ your_or_their} income over the last 12 months was 
  ${ currency(get_annual_total()) } (${ currency(get_annual_total()/12) }
  per month). The judge will look at income from last month and the average monthly income over the last 12 months.
  
  For a **full ${ form_name }**, with ${ your_or_their} household size, ${ your_or_their } monthly income needs to be at or below 
  ${ currency(poverty_scale_get_income_limit(household_size=household_size, multiplier=1.25)/12) }. For a **partial ${ form_name }**, it needs to be between ${ currency(poverty_scale_get_income_limit(household_size=household_size, multiplier=1.25)/12) } and ${ currency(poverty_scale_get_income_limit(household_size=household_size, multiplier=2.0)/12) } per month.
  
  The judge will also consider ${ your_or_their } total assets of ${ currency(get_asset_total()) }
  and ${ your_or_their } total monthly expenses of ${ currency(user_expense_total) }.

  % if filing_basis == "filing_self":
  <div class="alert alert-info ilao-info" role="alert">
    <h6 class="alert-heading">Explain other reasons why you need an ${ form_name }</h6>
    <p>You can tell the judge about other reasons why it is hard for you to pay for court costs on another screen. This will be added to your ${ form_name } application.</p>
  </div>
  % else:
  <div class="alert alert-info ilao-info" role="alert">
    <h6 class="alert-heading">Explain other reasons why ${ users[0].familiar() } needs an ${ form_name }</h6>
    <p>You can tell the judge about other reasons why it is hard for ${ users[0].familiar() } to pay for court costs on another screen. This will be added to their ${ form_name } application.</p>
  </div>
  % endif 
  
  #### A judge makes the final decision
  This website cannot tell you if ${ you_or_they } qualify for sure. The judge will
  consider all of the information you provide.
  
  ${ collapse_template(other_fee_waiver_considerations) }  

---
template: other_fee_waiver_considerations
subject: |
  **What else the judge will consider**
content: |  
  The judge will look at all of the information that you provide on the ${ form_name } application
  to decide if ${ you_or_they } qualify. For example, the judge will compare ${ your_or_their }
  assets and expenses. They will also read any additional explanation that you
  decide to provide.
  
  Some of ${ your_or_their } assets will not be counted. For example: the value of ${ your_or_their } car,
  up to $3,600, is not counted. A person can have up to $4,000 in other assets,
  such as bank accounts, that are not counted. The assets that are not
  counted are set by law: specifically, 
  [**735 ILCS 5/12-901**](https://www.ilga.gov/legislation/ilcs/fulltext.asp?DocName=073500050K12-1001)
  and [**735 ILCS 5/12-1001**](https://www.ilga.gov/legislation/ilcs/fulltext.asp?DocName=073500050K12-901).
  
  The judge may decide that ${ you_or_they } qualify for a partial reduction in court fees even if ${ you_or_they } do not qualify for a full waiver.  
