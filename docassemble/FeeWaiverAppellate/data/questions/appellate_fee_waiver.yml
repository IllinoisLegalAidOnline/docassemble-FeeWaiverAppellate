id: appellate court only
continue button field: appellate_fee_waiver
question: |
  Fee waiver for appellate court 
subquestion: |
  You can use this program to make fee waiver forms if you have a case in the Illinois Appellate Court.
  
  There are **different fee waiver forms** to use if:

  * Your case is in the circuit court. This is also called the trial court, and it is where most cases start. Examples of circuit court cases are divorce, family law, evictions, small claims, foreclosures, and lawsuits for injury or property damage. Asking a judge to expunge or seal a criminal case is also started in circuit court. If you need to ask for a fee waiver in a circuit court case, use the [**Fee waiver Easy Form**](https://www.illinoislegalaid.org/node/30831).
  
  * Your case is in the Illinois Supreme Court. If you need to ask for a fee waiver in a Supreme Court case, use the [**Fee waiver - Supreme Court of Illinois Easy Form**](https://www.illinoislegalaid.org/node/158696).
  
  If you were ordered to pay court costs (called "assessments") in a criminal or traffic case and cannot afford them, use the [**Criminal Court fee waiver Easy Form**](https://www.illinoislegalaid.org/node/154466).
