template: user_role_help
subject: |
  **How to determine your role in the circuit court case**
content: |  
  % if filing_basis == "filing_self":
  If you were the first person to file a form in the circuit court case, you started the case. You are the **Plaintiff** or the **Petitioner.**

  If you were responding to a circuit court case or court papers someone else filed, you are the **Defendant** or the **Respondent.**
  % else:
  If ${ users[0].familiar() } was the first person to file a form in the circuit court case, they started the case. ${ users[0].familiar() } is the **Plaintiff** or the **Petitioner.**

  If ${ users[0].familiar() } was responding to a circuit court case or court papers someone else filed, ${ users[0].familiar() } is the **Defendant** or the **Respondent.**
  % endif
